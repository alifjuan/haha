<!DOCTYPE html>
<html lang="id">
<head>
<!-- SAME HEAD AS BEFORE -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKJ 1 - Animasi Premium</title>
<link rel="shortcut icon" href="https://uimedan.ac.id/uploads/setup/Wgv2svxKBHl25JLRy0uHThgY1iae5E0srQ8U2b9x.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<!-- SAME STYLES AS BEFORE - COPY DARI KODE SEBELUMNYA -->
</head>
<body>
<!-- SAME HTML STRUCTURE AS BEFORE -->

<!-- 🔥 PESAN ANONIM - DATA PERMANENT -->
<div class="container mb-5 fade-in-up">
<div class="anonim-section" id="anonimSection">
    <!-- SAME HEADER WITH ADMIN PANEL -->
    
    <div class="anonim-messages" id="anonimMessages">
        <!-- PESAN AKAN AUTO-LOAD DARI localStorage -->
    </div>
    
    <!-- SAME FORM -->
</div>
</div>

<script>
// 🔥 STORAGE SYSTEM - PESAN TER-SIMPAN SELAMANYA!
class AnonimStorage {
    static get STORAGE_KEY() {
        return 'tkj1_anonim_messages_v2';
    }
    
    static save(messages) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(messages));
    }
    
    static load() {
        try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch (e) {
            console.error('Error loading messages:', e);
            return [];
        }
    }
    
    static clear() {
        localStorage.removeItem(this.STORAGE_KEY);
    }
}

// Load pesan saat halaman dimuat
let messagesData = AnonimStorage.load();
let messageCounter = messagesData.length > 0 ? Math.max(...messagesData.map(m => m.id)) + 1 : 1;
let isAdminMode = false;
const ADMIN_PASSWORD = "admin123";

// Render semua pesan dari storage
function renderMessages() {
    const container = document.getElementById('anonimMessages');
    container.innerHTML = ''; // Clear
    
    messagesData.forEach(message => {
        const messageEl = createMessageElement(message);
        container.appendChild(messageEl);
    });
    
    // Scroll ke atas
    container.scrollTop = 0;
}

function createMessageElement(message) {
    const div = document.createElement('div');
    div.className = 'message-item fade-in-up';
    div.dataset.messageId = message.id;
    div.innerHTML = `
        <div class="message-text">${escapeHtml(message.text)}</div>
        <div class="message-time">${formatTimeAgo(message.timestamp)}</div>
        <button class="delete-btn" onclick="deleteMessage(${message.id})">
            <i class="fas fa-trash"></i>
        </button>
    `;
    return div;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTimeAgo(timestamp) {
    const now = Date.now();
    const diff = now - timestamp;
    const minutes = Math.floor(diff / 60000);
    
    if (minutes < 1) return 'Baru saja';
    if (minutes < 60) return `${minutes} menit lalu`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} jam lalu`;
    const days = Math.floor(hours / 24);
    return `${days} hari lalu`;
}

// 🔥 SEND PESAN - AUTO SAVE KE STORAGE
function sendAnonimMessage() {
    const input = document.getElementById('anonimInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();
    
    if (!text || text.length > 280) {
        showAlert('❌ Pesan kosong atau terlalu panjang!', 'warning');
        return;
    }
    
    // Buat pesan baru
    const newMessage = {
        id: messageCounter,
        text: text,
        timestamp: Date.now()
    };
    
    // Tambah ke array (paling atas)
    messagesData.unshift(newMessage);
    
    // Simpan ke storage
    AnonimStorage.save(messagesData);
    
    // Render ulang
    renderMessages();
    
    // Reset form
    input.value = '';
    updateCharCount();
    
    // UI feedback
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<i class="fas fa-check"></i> Terkirim!';
    
    setTimeout(() => {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Pesan';
        showAlert('✅ Pesan tersimpan PERMANENT!', 'success');
    }, 1500);
    
    messageCounter++;
}

// 🔥 DELETE PESAN - ADMIN ONLY
function deleteMessage(messageId) {
    if (!isAdminMode) {
        showAlert('❌ Masukkan password admin dulu!', 'danger');
        return;
    }
    
    if (confirm('Hapus pesan ini?')) {
        messagesData = messagesData.filter(m => m.id !== messageId);
        AnonimStorage.save(messagesData);
        renderMessages();
        showAlert('✅ Pesan dihapus!', 'success');
    }
}

// 🔥 HAPUS SEMUA - ADMIN ONLY
function clearAllMessages() {
    if (!isAdminMode) {
        showAlert('❌ Admin only!', 'danger');
        return;
    }
    
    if (confirm('HAPUS SEMUA PESAN FOREVER?')) {
        messagesData = [];
        AnonimStorage.save(messagesData);
        renderMessages();
        showAlert('🧹 Semua pesan dihapus!', 'success');
        messageCounter = 1;
    }
}

// SAME ADMIN FUNCTIONS
function toggleAdminMode() {
    const password = document.getElementById('adminPassword').value;
    if (password === ADMIN_PASSWORD) {
        isAdminMode = true;
        document.getElementById('anonimSection').classList.add('admin-mode');
        document.getElementById('adminStatus').textContent = 'ADMIN ACTIVE';
        showAdminButtons();
        showAlert('🔐 Admin mode ON - tombol delete muncul!', 'success');
    } else {
        showAlert('❌ Password salah!', 'danger');
    }
}

function showAdminButtons() {
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.style.opacity = '1';
        btn.style.display = 'flex';
    });
}

// SAME UTILITY FUNCTIONS (updateCharCount, showAlert, etc)
// ... copy dari kode sebelumnya

// 🔥 INIT - LOAD PESAN SAAT HALAMAN DIMUAT
document.addEventListener('DOMContentLoaded', function() {
    renderMessages(); // Load dari storage
    updateCharCount();
    
    // Auto scroll ke anonim section
    setTimeout(() => {
        document.getElementById('anonimSection').scrollIntoView({behavior: 'smooth'});
    }, 2000);
});

// Simpan otomatis setiap 30 detik (backup)
setInterval(() => {
    if (messagesData.length > 0) {
        AnonimStorage.save(messagesData);
    }
}, 30000);
</script>
</body>
</html>
