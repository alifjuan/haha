<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-device-width, initial-scale=1.0">
    <title>Profil Instagram | XI TKJ 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            min-height: 100vh;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto glass-container shadow-2xl overflow-hidden" data-aos="zoom-in">
        <!-- Profile Header -->
        <div class="p-8 border-b border-gray-200">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="relative">
                    <div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-yellow-400 to-purple-600">
                        <img src="https://www.instagram.com/elevenclass_tkjone?igsh=MWRidDhmdWV1ZjhnbA==" class="w-full h-full rounded-full border-4 border-white object-cover" alt="Profile">
                    </div>
                </div>

                <div class="flex-1 text-center md:text-left">
                    <!-- Username & Follow Button -->
                    <div class="flex flex-col md:flex-row md:items-center gap-4 mb-4">
                        <h1 class="text-2xl font-light text-gray-800">elevenclass_tkjone</h1>
                        <!-- Tombol buka Instagram App -->
                      <a href="https://www.instagram.com/elevenclass_tkjone?igsh=MWRidGhm dW1zZjhnYw==" 
                           target="_blank" 
                             class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-6 py-1.5 rounded-lg font-semibold text-sm hover:shadow-lg transition-all duration-200 flex items-center">
                               <i class="fab fa-instagram mr-2"></i> Buka di Instagram
                     </a>
                    </div>
                    
                    <!-- Stats -->
                    <div class="flex justify-center md:justify-start gap-8 mb-4 font-medium">
                        <span><strong class="text-gray-900">12</strong> kiriman</span>
                        <span><strong class="text-gray-900">39</strong> pengikut</span>
                        <span><strong class="text-gray-900">15</strong> diikuti</span>
                    </div>

                    <!-- Bio -->
                    <div class="text-sm">
                        <p class="font-bold">XI TKJ 1 SMK Imelda Medan</p>
                        <p class="text-gray-600">Generasi Digital & Inovasi 🚀</p>
                        <a href="https://www.instagram.com/elevenclass_tkjone?igsh=MWRidDhmdWV1ZjhnbA==" class="text-blue-900 font-semibold hover:underline">www.xitkj1-imelda.com</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="p-4 md:p-8">
            <div class="flex justify-center border-t border-gray-200 mb-6">
                <div class="flex gap-12 -mt-[1px]">
                    <div class="border-t border-black py-4 flex items-center gap-2 text-xs font-bold tracking-widest uppercase cursor-pointer" onclick="openInstagramProfile()">
                        <i class="fa-solid fa-grid-3x3"></i> KIRIMAN
                    </div>
                    <div class="py-4 flex items-center gap-2 text-xs font-bold tracking-widest uppercase text-gray-400 cursor-pointer" onclick="openInstagramReels()">
                        <i class="fa-solid fa-clapperboard"></i> REELS
                    </div>
                </div>
            </div>

            <!-- Posts Grid -->
            <div class="grid grid-cols-3 gap-1 md:gap-6">
                <div class="aspect-square relative group cursor-pointer overflow-hidden rounded-md" data-aos="fade-up">
                    <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=500&auto=format&fit=crop" class="w-full h-full object-cover group-hover:brightness-50 transition" onclick="openInstagramProfile()">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 text-white gap-4">
                        <span><i class="fas fa-heart"></i> 45</span>
                        <span><i class="fas fa-comment"></i> 12</span>
                    </div>
                </div>
                <!-- Post lainnya sama... -->
            </div>
        </div>
    </div>

    <!-- Back Button -->
    <div class="text-center mt-8">
        <a href="index.html" class="text-white hover:underline font-medium">
            <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
        </a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Fungsi buka Instagram Profile (Deep Link Resmi)
        function openInstagramProfile() {
            const username = 'xitkj1_imelda';
            
            // Coba buka Instagram App dulu (Android/iOS)
            const instagramUrl = `https://www.instagram.com/elevenclass_tkjone?igsh=MWRidDhmdWV1ZjhnbA==`;
            const instagramAppUrl = `instagram://user?username=${username}`;
            
            // Coba buka app Instagram
            window.open(instagramAppUrl, '_system');
            
            // Fallback ke web jika app tidak ada (delay 1.5 detik)
            setTimeout(() => {
                window.open(instagramUrl, '_blank');
            }, 1500);
        }

        // Fungsi buka Reels
        function openInstagramReels() {
            const instagramUrl = "https://www.instagram.com/elevenclass_tkjone?igsh=MWRidDhmdWV1ZjhnbA==";
            window.open(instagramUrl, '_blank');
        }
    </script>
</body>
</html>
