        .whatsapp-btn::before {

            font-size: 1.2em;

        .whatsapp-icon::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid rgba(255,255,255,0.3);
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover .whatsapp-icon::after {
            opacity: 1;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* ✨ WA ICON KECIL (Stats & Footer) ✨ */
        .whatsapp-icon-small {

        }

        .whatsapp-icon-small::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);

        }

        .whatsapp-icon-small:hover::before {

    </style>
</head>

    <!-- Scripts -->
    <script>
        // Navbar scroll - SAMA
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.style.background = 'rgba(15, 23, 42, 0.95)';
            } else {
                nav.style.background = 'rgba(255,255,255,0.08)';
            }
        });

        // Counter animation - SAMA
        function animateCounter(el, target) {
            let start = 0;
            const increment = target / 50;
            const timer = setInterval(() => {
                start += increment;
                if (start >= target) {
                    el.textContent = target;
                    clearInterval(timer);
                } else {
                    el.textContent = Math.floor(start);
                }
            }, 20);
        }

        // Observer - SAMA
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const num = entry.target.querySelector('.stats-number');
                    if (num) animateCounter(num, parseInt(num.dataset.target));
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.glass-card, .gallery-grid').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'all 0.6s ease';
            observer.observe(el);
        });

        // ✨ WA CLICK SOUND EFFECT ✨
        document.querySelectorAll('.whatsapp-btn, .whatsapp-icon-small').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Vibration API (mobile)
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
                
                // Scale animation on click
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
