<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru X TKJ 1 - SMK IMELDA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FIXED Navbar - Compact */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white !important;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .back-btn:hover, .back-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.6);
            color: white !important;
        }

        /* COMPACT Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 70px 15px 20px;
        }

        /* COMPACT Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .header h1 {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 90%;
            margin: 0 auto 15px;
        }

        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            margin: 0 auto;
            border-radius: 2px;
            animation: expand 0.8s ease-out 0.3s both;
        }

        @keyframes expand { from { width: 0; } to { width: 70px; } }

        /* MOBILE-FIRST Grid */
        .teachers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* Desktop: 2-3 kolom */
        @media (min-width: 768px) {
            .teachers-grid { 
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 25px;
            }
        }

        /* COMPACT Cards */
        .teacher-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        .teacher-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48cae4);
            background-size: 200% 100%;
            animation: gradientShift 2s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .teacher-card.animate {
            opacity: 1; transform: translateY(0);
        }

        .teacher-card:hover, .teacher-card:active {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255,255,255,0.22);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* COMPACT Images */
        .teacher-img {
            height: 220px;
            width: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .teacher-card:hover .teacher-img {
            transform: scale(1.08);
            filter: brightness(1.1);
        }

        .teacher-info {
            padding: 20px 18px;
            text-align: center;
            color: white;
        }

        .teacher-name {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .teacher-role {
            font-size: 0.88rem;
            color: #feca57;
            font-weight: 500;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .social-btn:hover, .social-btn:active {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(255,107,107,0.4);
        }

        /* FIXED Footer */
        .footer {
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(20px);
            color: rgba(255,255,255,0.95);
            text-align: center;
            padding: 20px 15px;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.15);
            font-size: 0.9rem;
        }

        /* Lightweight Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tiny Particles */
        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            animation: float 18s infinite linear;
        }
        .particle:nth-child(1) { width: 40px; height: 40px; left: 15%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 25px; height: 25px; left: 75%; animation-delay: -4s; }
        .particle:nth-child(3) { width: 20px; height: 20px; left: 40%; animation-delay: -8s; }
        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* Scroll Animations */
        .reveal {
            opacity: 0; transform: translateY(40px);
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- FIXED Back Button -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="Selengkapnya.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="header reveal">
            <h1>Guru Pengajar dari X-XII</h1>
            <p>Wali Kelas X-XII TKJ 1 SMK IMELDA</p>
            <div class="divider"></div>
        </div>

        <div class="teachers-grid">
            <div class="teacher-card reveal">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=350&h=220&fit=crop&crop=face" 
                     alt="SriRoji" class="teacher-img" loading="lazy">
                <div class="teacher-info">
                    <h3 class="teacher-name">SriRoji</h3>
                    <p class="teacher-role">Wali Kelas X / AGAMA ISLAM</p>
                    <div class="social-links">
                        <a href="#" class="social-btn" title="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="mailto:guru@smkimelda.ac.id" class="social-btn" title="Email"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
            </div>

            <div class="teacher-card reveal">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=350&h=220&fit=crop&crop=face" 
                     alt="Siti Aisyah" class="teacher-img" loading="lazy">
                <div class="teacher-info">
                    <h3 class="teacher-name">Erfina</h3>
                    <p class="teacher-role">Wali Kelas XI / Jaringan & Server</p>
                    <div class="social-links">
                        <a href="#" class="social-btn" title="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="@gmail.com" class="social-btn" title="Email"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
            </div>

            <div class="teacher-card reveal">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=350&h=220&fit=crop&crop=face" 
                     alt="Budi Santoso" class="teacher-img" loading="lazy">
                <div class="teacher-info">
                    <h3 class="teacher-name">Budi Santoso, S.Pd</h3>
                    <p class="teacher-role">Desain Grafis</p>
                    <div class="social-links">
                        <a href="#" class="social-btn" title="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="mailto:guru@smkimelda.ac.id" class="social-btn" title="Email"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 TKJ 1 SMK IMELDA</p>
    </footer>

    <!-- ULTRA LIGHT JS - NO CONFLICTS -->
    <script>
        // Navbar scroll
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30);
        });

        // Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('active', 'animate'), i * 150);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -80px 0px' });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Parallax
        window.addEventListener('scroll', () => {
            document.querySelector('.particles').style.transform = 
                `translateY(${window.pageYOffset * 0.3}px)`;
        });
    </script>
</body>
</html>
